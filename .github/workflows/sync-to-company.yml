name: Sync to Company Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    # Only run on the personal repo, not the company mirror
    if: github.repository == 'bsulee/rome'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to BrianxDeu/rome
        env:
          COMPANY_TOKEN: ${{ secrets.COMPANY_REPO_TOKEN }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git push --force https://x-access-token:${COMPANY_TOKEN}@github.com/BrianxDeu/rome.git HEAD:main
