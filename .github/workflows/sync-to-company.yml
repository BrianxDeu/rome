name: Sync to Company Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to BrianxDeu/rome
        run: |
          git remote add company https://x-access-token:${{ secrets.COMPANY_REPO_TOKEN }}@github.com/BrianxDeu/rome.git
          git push company main --force
