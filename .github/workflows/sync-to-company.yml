name: Sync to Company Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to BrianxDeu/rome
        env:
          COMPANY_TOKEN: ${{ secrets.COMPANY_REPO_TOKEN }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git push --force https://x-access-token:${COMPANY_TOKEN}@github.com/BrianxDeu/rome.git HEAD:main
